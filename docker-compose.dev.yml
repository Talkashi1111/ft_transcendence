services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/app:cached
      - sqlite-data:/app/data
      - node_modules_cache:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
      - backend_node_modules:/app/backend/node_modules
    networks:
      - transcendence
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:/app/data/database.db
      - VITE_API_URL=http://localhost:3000
    ports:
      - '5173:5173' # Frontend Vite dev server
      - '3000:3000' # Backend API server
    command: sleep infinity

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.4
    profiles: ['elk']
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - '9200:9200'
    networks:
      - transcendence

  logstash:
    image: docker.elastic.co/logstash/logstash:9.2.4
    profiles: ['elk']
    depends_on:
      - elasticsearch
    ports:
      - '5000:5000'
    command: >
      logstash -e 'input { tcp { port => 5000 codec => json_lines } }
      output { elasticsearch { hosts => ["http://elasticsearch:9200"] index => "transcendence-%{+YYYY.MM.dd}" }
      stdout { codec => rubydebug } }'
    networks:
      - transcendence

  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.4
    profiles: ['elk']
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
      - XPACK_SECURITY_ENABLED=false
    ports:
      - '5601:5601'
    networks:
      - transcendence

volumes:
  sqlite-data:
  node_modules_cache:
  frontend_node_modules:
  backend_node_modules:
  esdata:

networks:
  transcendence:
