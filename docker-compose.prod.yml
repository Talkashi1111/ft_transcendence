name: ft_transcendence_prod # Different project name to avoid conflicts

services:
  # Caddy reverse proxy with TLS termination
  caddy:
    image: caddy:2-alpine
    container_name: ft_transcendence-caddy
    restart: unless-stopped
    ports:
      # Use unprivileged ports (no root required)
      # Access via https://localhost:8443 or https://mooo.com:8443
      - '8443:443' # HTTPS
      - '8080:80' # HTTP (redirects to HTTPS)
      - '3001:3001' # HTTPS for Grafana. Caddy forwards to Grafana's internal port 3000
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - transcendence-prod
    depends_on:
      - app
      - grafana

  app:
    container_name: ft_transcendence-prod
    # Pre-built image from GitHub Actions CI
    image: ghcr.io/talkashi1111/ft_transcendence:latest
    # Always pull latest image from registry (see: https://docs.docker.com/reference/compose-file/services/#pull_policy)
    pull_policy: always
    # To build locally instead: uncomment build section and set pull_policy to 'build'
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   target: production
    restart: unless-stopped
    volumes:
      - sqlite-data:/app/data
    networks:
      - transcendence-prod
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/database.db
      # Required secrets - set these before running!
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      # OAuth (optional - only if using Google login)
      # Note: OAUTH_CALLBACK_URI is auto-detected from request host
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # Two-Factor Authentication (optional)
      - TWO_FACTOR_ENCRYPTION_KEY=${TWO_FACTOR_ENCRYPTION_KEY:-}
      # Blockchain (optional)
      - PRIVATE_KEY=${PRIVATE_KEY:-}
      - FUJI_RPC_URL=${FUJI_RPC_URL:-https://api.avax-test.network/ext/bc/C/rpc}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS:-}
    # Internal port only - Caddy handles external traffic
    expose:
      - '3000'
    # Expose Prisma Studio for database inspection during defense
    # Access at http://localhost:5556 after running: docker exec -it ft_transcendence-prod npx prisma studio --url "file:/app/data/database.db" --browser none --port 5556
    ports:
      - '5556:5556'

  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: prometheus-prod
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=14d'
      - '--storage.tsdb.retention.size=2GB'
    volumes:
      - ./prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data-prod:/prometheus
    networks:
      - transcendence-prod

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: alertmanager-prod
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    configs:
      - source: alertmanager_config
        target: /etc/alertmanager/alertmanager.yml
    volumes:
      - alertmanager-data-prod:/alertmanager
    networks:
      - transcendence-prod
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana-prod
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource

      - GF_SECURITY_COOKIE_SECURE=true # Adds 'Secure' flag to cookies grafana gives you when logged in so they are only sent over HTTPS. If a hacker intercepts your cookies over HTTP, they can't use them to hijack your session.
      - GF_SERVER_ROOT_URL=https://localhost:3001 # It tells Grafana its public URL so that generated links and redirects (like for OAuth) match the external address the user visits, rather than its internal container address.
      - GF_SECURITY_DISABLE_GRAVATAR=true
    volumes:
      - grafana-data-prod:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
      - sqlite-data:/var/lib/grafana/db-mount
    expose:
      - '3000' # Expose to Caddy only
    networks:
      - transcendence-prod
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter-prod
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - transcendence-prod

  cadvisor:
    image: gcr.io/cadvisor/cadvisor@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57
    container_name: cadvisor-prod
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - transcendence-prod

volumes:
  sqlite-data:
  caddy_data:
  caddy_config:
  prometheus-data-prod:
  grafana-data-prod:
  alertmanager-data-prod:

networks:
  transcendence-prod:

configs:
  alertmanager_config:
    content: |
      global:
        resolve_timeout: 5m

      route:
        group_by: ["alertname"]
        group_wait: 10s
        group_interval: 10s
        repeat_interval: 1h
        receiver: "discord_personal"

      receivers:
        - name: "discord_personal"
          discord_configs:
            - webhook_url: "${DISCORD_WEBHOOK_URL}"
              send_resolved: true
              title: "ALERT: {{ .CommonLabels.alertname }}"
              message: |
                {{ range .Alerts }}
                **Summary:** {{ .Annotations.summary }}
                **Description:** {{ .Annotations.description }}
                **Severity:** {{ .Labels.severity }}
                {{ end }}
