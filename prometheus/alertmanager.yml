global:
  resolve_timeout: 5m # Time to wait before resolving an alert

route:
  group_by: ['alertname']
  group_wait: 10s 
  group_interval: 10s # Time to wait before sending a new notification about a group
  repeat_interval: 1h # Time to wait before resending a notification about a resolved alert
  receiver: 'discord_personal' # Default receiver
  routes:
    - matchers: # Since the alert matches the 'env' and 'alertname' labels defined in prometheus.yml, Alertmanager ignores the default receiver and sends it to 'dev-null'
        - env = "dev"
        - alertname = "InstanceDown"
      receiver: 'dev-null'

receivers:
  - name: 'discord_team'
    discord_configs:
      - webhook_url: "https://discord.com/api/webhooks/1462028238271287368/E2Pmp-LyfH_zJ-z62OUm9QEZ3Vc03rpVcQO1wFFl4INRl7igHJBic5Wnt-dZRXeguimr"
        send_resolved: true # Notify when alerts are resolved
        # Customizing the message format
        title: '{{ .CommonLabels.alertname }} ({{ .Status | toUpper }})'
        message: >-
          {{ range .Alerts }}
          **Summary:** {{ .Annotations.summary }}
          **Description:** {{ .Annotations.description }}
          **Severity:** {{ .Labels.severity }}
          --------------------------------
          {{ end }}

  - name: 'discord_personal'
    discord_configs:
      - webhook_url: "https://discord.com/api/webhooks/1462922120496414805/yL5-IoXXN5SU2fF2605jpLCxSbiXgJi7-3QEbVzYq7nsXJizE0JnQwdAounBC6_UyKfm" # <--- Paste new URL here
        send_resolved: true
        title: '🚨 PERSONAL ALERT: {{ .CommonLabels.alertname }}'
        message: >-
          {{ range .Alerts }}
          **Summary:** {{ .Annotations.summary }}
          **Description:** {{ .Annotations.description }}
          **Severity:** {{ .Labels.severity }}
          --------------------------------
          {{ end }}

  - name: 'dev-null' # Receiver to drop alerts in development
    webhook_configs:
      - url: 'http://127.0.0.1:1/' # Dummy URL to drop alerts
        send_resolved: true
